<div class="game-card" [class.is-peak-card]="item.isPeak">
  <div class="image-container">
    <img *ngIf="item.imatge" [src]="item.imatge" [alt]="item.nom">
    <span class="badge" *ngIf="item.isPeak">Top Played!</span>
  </div>
  
  <div class="card-info">
    <h3 class="game-title">{{ item.nom }}</h3>
    <p class="game-stats">{{ item.valor }} h played</p>
  </div>
</div>
