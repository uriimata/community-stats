<div class="card">
  <h3 class="card-title">{{ item.nom | uppercase }}</h3>
  <div class="card-content">
    <div class="card-body">
      <p><strong>Playtime: </strong> {{ item.valor | number:'1.0-2' }}h</p>
      <p><strong>Type: </strong>{{ item.descripcio }}</p>
    </div>

    <img *ngIf="item.imatge" [src]="item.imatge" [alt]="item.nom" class="card-img">
  </div>
</div>
