<form #meuForm="ngForm" (ngSubmit)="enviarCerca()" role="search">
  <div class="search-group">
    <label for="input-cerca" class="sr-only">Cercar per nom del joc</label>
    
    <input 
      id="input-cerca"
      type="text" 
      name="cerca"
      [(ngModel)]="terminiCerca"
      #inputControl="ngModel"
      required 
      minlength="3"
      placeholder="Ex: Zelda, Mario..."
      aria-required="true"
      [attr.aria-invalid]="inputControl.invalid && inputControl.touched"
    >

    <button 
      type="submit" 
      [disabled]="meuForm.invalid"
      aria-label="Executar cerca">
      Cercar
    </button>
  </div>

  <div *ngIf="inputControl.invalid && inputControl.touched" 
       role="alert" 
       aria-live="polite" 
       class="error-text">
    Escriu almenys 3 caràcters per cercar.
  </div>
</form>
